<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City RPG</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <script src="vendor/phaser.min.js"></script>
    <!-- Socket.io v4 client (must match server: python-socketio 5.x / engineio 4.x) -->
    <script src="/vendor/socket.io.min.js"></script>

    <!-- HUD overlay (sits on top of the Phaser canvas via CSS) -->
    <div id="hud">
      <div id="character-panel">
        <div id="char-portrait">⚔</div>
        <div id="char-stats">
          <div id="char-name">Hero</div>
          <div class="stat-row">
            <span class="stat-label">HP</span>
            <div class="bar-bg"><div class="bar-fill hp-bar" id="hp-bar"></div></div>
            <span class="stat-val" id="hp-val">100/100</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">EN</span>
            <div class="bar-bg"><div class="bar-fill energy-bar" id="energy-bar"></div></div>
            <span class="stat-val" id="energy-val">100/100</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">$</span>
            <span class="stat-val money-val" id="money-val">$100</span>
          </div>
        </div>
      </div>
      <div id="time-panel">
        <span id="day-val">Monday</span>
        <span id="time-val">8:00 AM</span>
        <span id="rank-val" class="rank-badge">Trainee</span>
      </div>
      <div id="controls-hint">Arrows — move &nbsp;|&nbsp; E — interact</div>
    </div>

    <!-- Global state and persistence (loaded before scenes) -->
    <script src="js/GameState.js"></script>
    <script src="js/SaveManager.js"></script>
    <script src="js/CharacterCreator.js"></script>

    <!-- Phaser scenes -->
    <script src="js/scenes/BootScene.js"></script>
    <script src="js/scenes/GameScene.js"></script>
    <script src="js/scenes/CasinoLobbyScene.js"></script>
    <script src="js/scenes/RouletteScene.js"></script>
    <script src="js/scenes/BlackjackScene.js"></script>
    <script src="js/scenes/PizzeriaScene.js"></script>
    <script src="js/scenes/HomeScene.js"></script>
    <script src="js/main.js"></script>

    <script>
      // ── Connect to server, then show character creator ──────────────────────
      window.addEventListener('load', () => {
        const socket = io({ transports: ['polling'] });
        window.socket = socket;

        socket.on('connect', () => {
          CharacterCreator.show();
        });

        socket.on('connect_error', () => {
          CharacterCreator.showError('Cannot connect to server. Is app.py running?');
        });

        // Final save when the tab is closed or refreshed.
        // socket.emit is best-effort here; most browsers will dispatch it
        // before tearing down the connection.
        window.addEventListener('beforeunload', () => {
          if (window.socket && window.socket.connected) {
            SaveManager.save();
          }
        });
      });
    </script>
  </div>
</body>
</html>
